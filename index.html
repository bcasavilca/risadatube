<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RisadaTube - Vídeos de Comédia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-laugh-beam"></i>
            <span>RisadaTube</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar vídeos de comédia...">
            <button onclick="searchVideos()"><i class="fas fa-search"></i></button>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="filterCategory('all')">
            <i class="fas fa-home"></i>
            <span>Início</span>
        </div>
        <div class="nav-item" onclick="filterCategory('trending')">
            <i class="fas fa-fire"></i>
            <span>Em alta</span>
        </div>
        <div class="nav-item" onclick="filterCategory('maisvistos')">
            <i class="fas fa-star"></i>
            <span>Mais vistos</span>
        </div>
        <div class="nav-item" onclick="filterCategory('recente')">
            <i class="fas fa-bolt"></i>
            <span>Novidades</span>
        </div>
        <hr style="border: none; border-top: 1px solid #3a3a6e; margin: 15px 0;">
        <div class="nav-item" onclick="showCategories()">
            <i class="fas fa-th-large"></i>
            <span>Categorias</span>
        </div>
        <div class="nav-item subcategory" onclick="filterCategory('standup')">
            <i class="fas fa-microphone"></i>
            <span>Stand-up</span>
        </div>
        <div class="nav-item subcategory" onclick="filterCategory('vine')">
            <i class="fas fa-video"></i>
            <span>Vines</span>
        </div>
        <div class="nav-item subcategory" onclick="filterCategory('compilacao')">
            <i class="fas fa-film"></i>
            <span>Compilações</span>
        </div>
        <div class="nav-item subcategory" onclick="filterCategory('fail')">
            <i class="fas fa-grin-squint-tears"></i>
            <span>Fail Moments</span>
        </div>
        <hr style="border: none; border-top: 1px solid #3a3a6e; margin: 15px 0;">
        <div class="nav-item" onclick="focusSearch()">
            <i class="fas fa-search"></i>
            <span>Buscar</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Filter Tags -->
        <div class="filter-tags">
            <button class="tag active" onclick="filterCategory('all')">Todos</button>
            <button class="tag" onclick="filterCategory('standup')">Stand-up</button>
            <button class="tag" onclick="filterCategory('vine')">Vines</button>
            <button class="tag" onclick="filterCategory('compilacao')">Compilações</button>
            <button class="tag" onclick="filterCategory('trending')">Trending</button>
            <button class="tag" onclick="filterCategory('recente')">Recentes</button>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid">
            <!-- Videos serão inseridos via JavaScript -->
        </div>
    </main>

    <!-- Video Player Modal -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeVideo()">&times;</span>
            <div class="video-container" id="videoContainer"></div>
            <div class="video-info" id="videoInfo"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
