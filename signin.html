<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - RisadaTube</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <i class="fas fa-laugh-beam"></i>
                <h1>RisadaTube</h1>
            </div>
            
            <h2>Entrar</h2>
            <p class="auth-subtitle">Bem-vindo de volta! Continue a rir.</p>
            
            <form id="signinForm" onsubmit="handleSignIn(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn-auth">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
            
            <div class="auth-divider">
                <span>ou</span>
            </div>
            
            <div class="social-login">
                <button class="btn-social google" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i>
                    Continuar com Google
                </button>
                <button class="btn-social facebook" onclick="socialLogin('facebook')">
                    <i class="fab fa-facebook-f"></i>
                    Continuar com Facebook
                </button>
            </div>
            
            <p class="auth-footer">
                Não tem uma conta? 
                <a href="signup.html" class="auth-link">Criar conta</a>
            </p>
        </div>
        
        <div class="auth-image">
            <div class="auth-quote">
                <i class="fas fa-quote-left"></i>
                <p>"O riso é a melhor medicina, e aqui temos a dose certa!"</p>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
